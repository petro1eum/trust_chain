# Copy to consumer repo: .github/workflows/apatch.yml
# Or: apatch init-consumer --with-ci
name: apatch

on:
  pull_request:
    paths:
      - "**/*.py"
      - "**/*.ts"
      - "**/*.tsx"
      - "patches.jsonl"
      - "manifests/**"
      - ".apatch/**"

jobs:
  plan:
    runs-on: ubuntu-latest
    # `secrets` is not available in `if:` conditions, so surface presence as an env
    # flag (env *can* read secrets). apatch is a PRIVATE repo; CI installs it over
    # SSH using a read-only deploy key scoped to petro1eum/apatch only
    # (secret APATCH_DEPLOY_KEY) — least privilege, not a broad PAT. When the secret
    # is absent the governance steps skip and the job stays green; governance is
    # enforced locally regardless.
    env:
      HAS_APATCH_KEY: ${{ secrets.APATCH_DEPLOY_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up apatch deploy key
        if: ${{ env.HAS_APATCH_KEY == 'true' }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.APATCH_DEPLOY_KEY }}" > ~/.ssh/apatch_ci
          chmod 600 ~/.ssh/apatch_ci
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
      - name: Install apatch
        if: ${{ env.HAS_APATCH_KEY == 'true' }}
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/apatch_ci -o IdentitiesOnly=yes"
        run: pip install "apatch[mcp,languages] @ git+ssh://git@github.com/petro1eum/apatch.git"
      - name: Doctor
        if: ${{ env.HAS_APATCH_KEY == 'true' }}
        run: apatch doctor --json
      - name: Plan patches (if patches.jsonl exists)
        if: ${{ env.HAS_APATCH_KEY == 'true' && hashFiles('patches.jsonl') != '' }}
        run: |
          apatch plan --logs patches.jsonl --target-dir . --json > plan.json
          python3 -c "
          import json, sys
          data = json.load(open('plan.json'))
          failed = [e for e in data.get('entries', data) if not e.get('would_apply', True)]
          if failed:
              print('apatch plan: some steps would not apply', file=sys.stderr)
              sys.exit(1)
          "
      - name: Strip dry-run (if manifests changed)
        if: ${{ env.HAS_APATCH_KEY == 'true' && hashFiles('manifests/**') != '' }}
        run: |
          echo "Add project-specific strip -n commands for changed manifests"

  sandbox-gate:
    runs-on: ubuntu-latest
    env:
      HAS_APATCH_KEY: ${{ secrets.APATCH_DEPLOY_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up apatch deploy key
        if: ${{ env.HAS_APATCH_KEY == 'true' }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.APATCH_DEPLOY_KEY }}" > ~/.ssh/apatch_ci
          chmod 600 ~/.ssh/apatch_ci
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
      - name: Install apatch
        if: ${{ env.HAS_APATCH_KEY == 'true' }}
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/apatch_ci -o IdentitiesOnly=yes"
        run: pip install "apatch[mcp] @ git+ssh://git@github.com/petro1eum/apatch.git"
      # ADVISORY: scoped to the PR change set (--base). On a fresh CI checkout the
      # sandbox lease/ledger (.trustchain, .apatch/*) is gitignored, so there is no
      # active lease and the gate flags the PR's committed protected files. Full
      # blocking enforcement in CI requires committing the notarized index — tracked
      # as a follow-up. Until then this reports a signal without failing the job.
      - name: Sandbox + notarization CI gate (advisory)
        if: ${{ env.HAS_APATCH_KEY == 'true' }}
        continue-on-error: true
        run: |
          OUT="$(mktemp)"
          apatch sandbox ci-gate --target-dir . --base "origin/${{ github.base_ref }}" --json >"$OUT" || true
          python3 -c "
          import json, sys
          d = json.load(open(sys.argv[1]))
          if d.get('skipped'):
              print('ci-gate: skipped (no sandbox/enforcement)')
              sys.exit(0)
          if not d.get('ok'):
              n = d.get('notarization') or {}
              print('ci-gate (advisory):', d.get('reason') or 'reported violations', file=sys.stderr)
              p = n.get('rejection_prompt') or n.get('agent_message')
              if p:
                  print(p, file=sys.stderr)
              sys.exit(1)
          print('ci-gate: passed')
          " "$OUT"
