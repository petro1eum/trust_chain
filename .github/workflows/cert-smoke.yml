name: Cert chain smoke

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  tc-verify-pkix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: PKIX helper tests (local PEM bundle)
        run: python -m pytest tests/test_tc_verify_pkix.py -q
